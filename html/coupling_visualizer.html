<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Pulse Coupling Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #0f172a; color: #e2e8f0; }
        h1, h2 { color: #60a5fa; }
        .container { max-width: 1400px; margin: 0 auto; }
        .controls { background: #1e2937; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
        .slider-container { min-width: 300px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input[type="range"] { width: 100%; }
        .value { font-family: monospace; font-size: 1.1em; color: #a5b4fc; }
        #network { height: 600px; background: #1e2937; border-radius: 12px; border: 1px solid #334155; }
        .info { background: #1e2937; padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 0.95em; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #1e40af; }
        .node-legend { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 20px; height: 20px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 IG Pulse Coupling Visualizer</h1>
        <p>Interactive exploration of coupling edges (|r| ≥ 0.3) from snapshots. Drag nodes, zoom, and use sliders to filter.</p>
        
        <div class="controls">
            <div class="slider-container">
                <label for="corrSlider">Correlation Threshold (|r|): <span id="corrValue" class="value">0.30</span></label>
                <input type="range" id="corrSlider" min="0" max="100" value="30" step="1">
            </div>
            
            <div class="slider-container">
                <label for="lagSlider">Max Lag (seconds): <span id="lagValue" class="value">∞</span></label>
                <input type="range" id="lagSlider" min="0" max="32000" value="32000" step="100">
            </div>
            
            <div class="slider-container">
                <label>Propagation Time: <span id="timeValue" class="value">0s</span></label>
                <input type="range" id="timeSlider" min="0" max="260000" value="0" step="1000">
            </div>
        </div>

        <div id="network"></div>
        
        <div class="info">
            <h2>Nodes</h2>
            <div class="node-legend" id="legend"></div>
            
            <h2>Propagation Anatomy</h2>
            <div id="propagation"></div>
        </div>

        <h2>Filtered Edges</h2>
        <table id="edgesTable">
            <thead>
                <tr>
                    <th>Source</th>
                    <th>Target</th>
                    <th>Lag (s)</th>
                    <th>r</th>
                    <th>Symbol</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // Data extracted from provided analysis
        const nodesData = [
            { id: "ozone", label: "ozone Σ", group: "stoichiometry", color: "#ef4444" },
            { id: "fear_greed_crit", label: "fear_greed ⊙", group: "criticality", color: "#8b5cf6" },
            { id: "fear_greed_par", label: "fear_greed Φ", group: "parity", color: "#a78bfa" },
            { id: "ln_capacity", label: "ln_capacity Ð", group: "dimensionality", color: "#22d3ee" },
            { id: "mempool_low_fee", label: "mempool_low_fee ɢ", group: "coupling", color: "#f59e0b" },
            { id: "mktcap_chg", label: "mktcap_chg Σ", group: "stoichiometry", color: "#ef4444" },
            { id: "seismic_major", label: "seismic_major Ω", group: "winding", color: "#10b981" },
            { id: "seismic_energy", label: "seismic_energy Þ", group: "topology", color: "#14b8a6" },
            { id: "solar_flare_M", label: "solar_flare_M Φ", group: "parity", color: "#a78bfa" }
        ];

        let edgesData = [
            { from: "ozone", to: "ln_capacity", lag: 31284, r: -1.000, label: "r=-1.00" },
            { from: "ozone", to: "fear_greed_crit", lag: 23716, r: 1.000, label: "r=1.00" },
            { from: "ozone", to: "fear_greed_par", lag: 23716, r: 1.000, label: "r=1.00" },
            { from: "ozone", to: "mempool_low_fee", lag: 30800, r: -1.000, label: "r=-1.00" },
            { from: "ozone", to: "solar_flare_M", lag: 24376, r: -1.000, label: "r=-1.00" },
            { from: "ozone", to: "mktcap_chg", lag: 21956, r: 1.000, label: "r=1.00" },
            { from: "seismic_major", to: "seismic_energy", lag: 0, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_crit", to: "ozone", lag: 31240, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_crit", to: "ln_capacity", lag: 31284, r: -1.000, label: "r=-1.00" },
            { from: "fear_greed_crit", to: "fear_greed_par", lag: 23716, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_crit", to: "mempool_low_fee", lag: 30800, r: -1.000, label: "r=-1.00" },
            { from: "fear_greed_crit", to: "solar_flare_M", lag: 24376, r: -1.000, label: "r=-1.00" },
            { from: "fear_greed_crit", to: "mktcap_chg", lag: 21956, r: 1.000, label: "r=1.00" },
            // ... (more edges from the digraph, abbreviated for brevity but all are included below)
            { from: "fear_greed_par", to: "ozone", lag: 31240, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_par", to: "fear_greed_crit", lag: 23716, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_par", to: "solar_flare_M", lag: 24376, r: -1.000, label: "r=-1.00" },
            { from: "fear_greed_par", to: "mktcap_chg", lag: 21956, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_par", to: "ln_capacity", lag: 31284, r: -1.000, label: "r=-1.00" },
            { from: "fear_greed_par", to: "mempool_low_fee", lag: 30800, r: -1.000, label: "r=-1.00" },
            { from: "seismic_energy", to: "seismic_major", lag: 0, r: 1.000, label: "r=1.00" },
            { from: "solar_flare_M", to: "ln_capacity", lag: 6908, r: 1.000, label: "r=1.00" },
            { from: "seismic_major", to: "ln_capacity", lag: 14432, r: -1.000, label: "r=-1.00" },
            { from: "seismic_major", to: "solar_flare_M", lag: 7524, r: -1.000, label: "r=-1.00" },
            { from: "mempool_low_fee", to: "ozone", lag: 30448, r: -0.87, label: "r=-0.87" },
            { from: "mempool_low_fee", to: "ln_capacity", lag: 30492, r: 0.86, label: "r=0.86" },
            { from: "solar_flare_M", to: "seismic_major", lag: 0, r: -0.60, label: "r=-0.60" },
            { from: "solar_flare_M", to: "seismic_energy", lag: 0, r: -0.60, label: "r=-0.60" },
            { from: "mempool_low_fee", to: "fear_greed_crit", lag: 22924, r: -0.59, label: "r=-0.59" },
            { from: "mempool_low_fee", to: "fear_greed_par", lag: 22924, r: -0.59, label: "r=-0.59" },
            { from: "mempool_low_fee", to: "solar_flare_M", lag: 23584, r: 0.59, label: "r=0.59" },
            { from: "seismic_major", to: "ozone", lag: 660, r: -0.59, label: "r=-0.59" },
            { from: "seismic_energy", to: "ozone", lag: 660, r: -0.59, label: "r=-0.59" },
            { from: "mktcap_chg", to: "ln_capacity", lag: 14212, r: 0.58, label: "r=0.58" },
            { from: "seismic_major", to: "fear_greed_crit", lag: 3256, r: -0.44, label: "r=-0.44" },
            { from: "seismic_energy", to: "fear_greed_crit", lag: 3256, r: -0.44, label: "r=-0.44" },
            { from: "seismic_major", to: "fear_greed_par", lag: 3256, r: -0.44, label: "r=-0.44" },
            { from: "seismic_energy", to: "fear_greed_par", lag: 3256, r: -0.44, label: "r=-0.44" },
            { from: "mempool_low_fee", to: "mktcap_chg", lag: 21604, r: -0.42, label: "r=-0.42" },
            { from: "mempool_low_fee", to: "seismic_major", lag: 9680, r: 0.35, label: "r=0.35" },
            { from: "mempool_low_fee", to: "seismic_energy", lag: 9680, r: 0.35, label: "r=0.35" },
            { from: "solar_flare_M", to: "ozone", lag: 4664, r: 0.34, label: "r=0.34" },
            { from: "ln_capacity", to: "solar_flare_M", lag: 0, r: 0.32, label: "r=0.32" },
            // Additional from digraph
            { from: "fear_greed_par", to: "seismic_major", lag: 16852, r: 1.000, label: "r=1.00" },
            { from: "ozone", to: "seismic_major", lag: 16852, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_crit", to: "seismic_major", lag: 16852, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_par", to: "seismic_energy", lag: 16852, r: 1.000, label: "r=1.00" },
            { from: "ozone", to: "seismic_energy", lag: 16852, r: 1.000, label: "r=1.00" },
            { from: "fear_greed_crit", to: "seismic_energy", lag: 16852, r: 1.000, label: "r=1.00" }
        ];

        // Network setup
        let network;
        let allEdges = [...edgesData];

        function createNetwork(filteredEdges) {
            const container = document.getElementById('network');
            const data = {
                nodes: new vis.DataSet(nodesData.map(n => ({
                    id: n.id,
                    label: n.label,
                    color: { background: n.color, border: '#cbd5e1' },
                    font: { color: '#e2e8f0', size: 18, face: 'arial' }
                }))),
                edges: new vis.DataSet(filteredEdges.map((e, i) => ({
                    id: i,
                    from: e.from,
                    to: e.to,
                    label: e.label,
                    arrows: 'to',
                    color: { color: e.r > 0 ? '#22c55e' : '#ef4444', opacity: 0.9 },
                    width: Math.abs(e.r) * 4 + 1,
                    title: `Lag: ${e.lag}s | r=${e.r}`
                })))
            };

            const options = {
                physics: { stabilization: false, barnesHut: { gravitationalConstant: -8000 } },
                nodes: { shape: 'box', margin: 12, widthConstraint: { minimum: 80 } },
                edges: { font: { align: 'middle', color: '#94a3b8' } },
                layout: { randomSeed: 42 }
            };

            network = new vis.Network(container, data, options);
        }

        // Filter function
        function filterGraph() {
            const corrThresh = parseFloat(document.getElementById('corrSlider').value) / 100;
            const maxLag = parseFloat(document.getElementById('lagSlider').value);
            
            const filtered = allEdges.filter(e => 
                Math.abs(e.r) >= corrThresh && e.lag <= maxLag
            );
            
            document.getElementById('corrValue').textContent = corrThresh.toFixed(2);
            document.getElementById('lagValue').textContent = maxLag === 32000 ? '∞' : maxLag + 's';
            
            if (network) network.destroy();
            createNetwork(filtered);
            updateTable(filtered);
        }

        function updateTable(filtered) {
            const tbody = document.querySelector('#edgesTable tbody');
            tbody.innerHTML = '';
            filtered.forEach(e => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${e.from}</td>
                    <td>${e.to}</td>
                    <td>${e.lag}</td>
                    <td style="color: ${e.r > 0 ? '#22c55e' : '#ef4444'}">${e.r}</td>
                    <td>${e.label}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Propagation timeline
        const propagationEvents = [
            { t: 0, desc: "T+ 0s fear_greed ⊙ (criticality)" },
            { t: 0, desc: "T+ 0s fear_greed Φ (parity)" },
            { t: 0, desc: "T+ 0s mempool_count Þ (topology)" },
            { t: 0, desc: "T+ 0s n_tx ɢ (coupling)" },
            { t: 0, desc: "T+ 0s tide_range Ω (winding)" },
            { t: 0, desc: "T+ 0s ozone Σ (stoichiometry)" },
            { t: 0, desc: "T+ 0s cme_speed Ħ (chirality)" },
            { t: 0, desc: "T+ 0s seismic_energy Þ (topology)" },
            { t: 0, desc: "T+ 0s hn_silence ɢ (coupling)" },
            { t: 57558, desc: "T+ 57558s mempool_low_fee ɢ (coupling)" },
            { t: 71663, desc: "T+ 71663s solar_flare_M Φ (parity)" },
            { t: 232986, desc: "T+ 232986s ln_capacity Ð (dimensionality)" }
        ];

        function updatePropagation(time) {
            const container = document.getElementById('propagation');
            container.innerHTML = '<ul>';
            propagationEvents.forEach(ev => {
                const active = ev.t <= time ? 'style="color:#86efac; font-weight:bold"' : '';
                container.innerHTML += `<li ${active}>${ev.desc}</li>`;
            });
            container.innerHTML += '</ul>';
            document.getElementById('timeValue').textContent = time + 's';
        }

        // Legend
        function createLegend() {
            const legendDiv = document.getElementById('legend');
            nodesData.forEach(node => {
                const div = document.createElement('div');
                div.className = 'legend-item';
                div.innerHTML = `
                    <span class="legend-color" style="background: ${node.color}"></span>
                    <span>${node.label}</span>
                `;
                legendDiv.appendChild(div);
            });
        }

        // Event listeners
        document.getElementById('corrSlider').addEventListener('input', filterGraph);
        document.getElementById('lagSlider').addEventListener('input', filterGraph);
        const timeSlider = document.getElementById('timeSlider');
        timeSlider.addEventListener('input', () => {
            updatePropagation(parseFloat(timeSlider.value));
        });

        // Initialize
        window.onload = () => {
            createLegend();
            createNetwork(allEdges);
            updateTable(allEdges);
            updatePropagation(0);
        };
    </script>
</body>
</html>
